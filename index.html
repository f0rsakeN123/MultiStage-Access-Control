<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureGate Enterprise IAM</title>
    <style>
        body { background: #0a0b10; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1a1d2d; padding: 40px; border-radius: 12px; border-top: 4px solid #3b82f6; width: 90%; max-width: 600px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        h1, h2 { color: #fff; margin-top: 0; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #0f111a; border: 1px solid #2d3748; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn { background: #3b82f6; color: white; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .btn:hover { background: #2563eb; }
        .btn-danger { background: #ef4444; width: auto; padding: 6px 12px; margin: 2px; font-size: 0.8em; }
        .btn-success { background: #10b981; width: auto; padding: 6px 12px; margin: 2px; font-size: 0.8em; }
        .btn-warn { background: #f59e0b; width: auto; padding: 6px 12px; margin: 2px; font-size: 0.8em; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #2d3748; padding: 10px; text-align: left; font-size: 0.9em; }
        th { background: #2d3748; color: #a0aec0; text-transform: uppercase; }
        .hidden { display: none; }
        #msg { color: #f59e0b; margin-top: 15px; font-size: 0.9em; text-align: center; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; background: #4b5563; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="view-login">
        <h2>Sustav za autorizaciju</h2>
        <p>Prijavite se pomoću službene e-mail adrese.</p>
        <input type="email" id="email" placeholder="vas.email@domena.com">
        <select id="role-select">
            <option value="Klijent">Klijent</option>
            <option value="Djelatnik">Djelatnik (Zahtijeva odobrenje)</option>
        </select>
        <button class="btn" onclick="requestLogin()">POŠALJI KOD</button>
        <div id="login-msg" id="msg"></div>
    </div>

    <div id="view-otp" class="hidden">
        <h2>Verifikacija</h2>
        <p>Unesite 6-znamenkasti kod koji smo poslali na vaš e-mail.</p>
        <input type="text" id="otp-code" placeholder="123456" maxlength="6">
        <button class="btn" onclick="verifyOTP()">POTVRDI KOD</button>
        <div id="otp-msg" id="msg"></div>
    </div>

    <div id="view-dashboard" class="hidden">
        <h2 id="dash-title">Nadzorna ploča</h2>
        <p id="dash-role" style="color: #60a5fa; font-weight: bold;"></p>
        
        <div id="pending-alert" class="hidden" style="background: #78350f; padding: 15px; border-radius: 6px; border: 1px solid #d97706;">
            <strong>Račun na čekanju!</strong> Administrator mora odobriti vaš pristup sustavu.
        </div>

        <div id="data-table-container" class="hidden">
            <table id="users-table">
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Uloga</th>
                        <th>Status</th>
                        <th>Akcije</th>
                    </tr>
                </thead>
                <tbody id="users-tbody"></tbody>
            </table>
        </div>
        <button class="btn" style="background: #4b5563; margin-top: 30px;" onclick="logout()">ODJAVA</button>
    </div>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxTOkaQLvoYkzB2WRkykXA41XTriJIeJOPLq9PSmltpqqwPoYRneATQpW1-mhYHb5Mdfw/exec"; 
    let sessionToken = "";
    let userEmail = "";
    let autoRefreshInterval;

    window.onload = function()
    {
        const savedToken = localStorage.getItem("sessionToken");
        const savedEmail = localStorage.getItem("userEmail");
        
        if(savedToken && savedEmail)
        {
            sessionToken = savedToken;
            userEmail = savedEmail;
            
            document.getElementById("view-login").classList.add("hidden");
            document.getElementById("view-dashboard").classList.remove("hidden");
            
            loadDashboard();
            startAutoRefresh();
        }
    };

    function startAutoRefresh()
    {
        if(autoRefreshInterval)
        {
            clearInterval(autoRefreshInterval);
        }
        
        autoRefreshInterval = setInterval(function()
        {
            if(sessionToken)
            {
                loadDashboard(true);
            }
        }, 3000);
    }

    function logout()
    {
        localStorage.removeItem("sessionToken");
        localStorage.removeItem("userEmail");
        if(autoRefreshInterval)
        {
            clearInterval(autoRefreshInterval);
        }
        location.reload();
    }

    async function requestLogin()
    {
        userEmail = document.getElementById("email").value;
        const role = document.getElementById("role-select").value;
        const msgDiv = document.getElementById("login-msg");
        
        if(!userEmail)
        {
            msgDiv.innerText = "Unesite email.";
            return;
        }

        msgDiv.innerText = "Slanje koda na email...";
        
        try
        {
            const res = await fetch(GOOGLE_URL + "?action=request_otp&email=" + encodeURIComponent(userEmail) + "&role=" + role);
            const data = await res.json();
            
            if(data.success)
            {
                document.getElementById("view-login").classList.add("hidden");
                document.getElementById("view-otp").classList.remove("hidden");
            }
            else
            {
                msgDiv.innerText = data.error;
            }
        }
        catch(e)
        {
            msgDiv.innerText = "Greška u komunikaciji sa serverom.";
        }
    }

    async function verifyOTP()
    {
        const code = document.getElementById("otp-code").value;
        const msgDiv = document.getElementById("otp-msg");
        
        msgDiv.innerText = "Provjera koda...";
        
        try
        {
            const res = await fetch(GOOGLE_URL + "?action=verify_otp&email=" + encodeURIComponent(userEmail) + "&code=" + code);
            const data = await res.json();
            
            if(data.success)
            {
                sessionToken = data.token;
                
                localStorage.setItem("sessionToken", sessionToken);
                localStorage.setItem("userEmail", userEmail);
                
                document.getElementById("view-otp").classList.add("hidden");
                document.getElementById("view-dashboard").classList.remove("hidden");
                
                loadDashboard();
                startAutoRefresh();
            }
            else
            {
                msgDiv.innerText = data.error;
            }
        }
        catch(e)
        {
            msgDiv.innerText = "Greška u komunikaciji.";
        }
    }

    async function loadDashboard(isAutoRefresh = false)
    {
        try
        {
            const res = await fetch(GOOGLE_URL + "?action=get_dashboard&token=" + sessionToken);
            const data = await res.json();
            
            if(data.success === false || data.forceLogout === true)
            {
                logout();
                return;
            }
            
            if(data.pending)
            {
                document.getElementById("dash-title").innerText = "Pristup Ograničen";
                document.getElementById("pending-alert").classList.remove("hidden");
                document.getElementById("data-table-container").classList.add("hidden");
                return;
            }
            
            if(data.success)
            {
                document.getElementById("pending-alert").classList.add("hidden");
                document.getElementById("dash-role").innerText = "Vaša razina pristupa: " + data.role;
                
                if(data.role === "Klijent")
                {
                    document.getElementById("data-table-container").innerHTML = "<p>Dobrodošli u klijentski portal.</p>";
                }
                else
                {
                    buildTable(data.users, data.role);
                }
                document.getElementById("data-table-container").classList.remove("hidden");
            }
        }
        catch(e)
        {
            console.error("Refresh error");
        }
    }

    function buildTable(users, currentUserRole)
    {
        const tbody = document.getElementById("users-tbody");
        tbody.innerHTML = "";
        
        for(const email in users)
        {
            const u = users[email];
            let actionsHtml = "";
            
            if(u.status === "pending")
            {
                if(currentUserRole === "Administrator")
                {
                    actionsHtml += "<button class='btn btn-success' onclick=\"manageUser('" + email + "', 'approve')\">Odobri</button>";
                }
                actionsHtml += "<button class='btn btn-danger' onclick=\"manageUser('" + email + "', 'delete')\">Odbij</button>";
            }
            else
            {
                if(currentUserRole === "Administrator")
                {
                    if(u.role === "Djelatnik")
                    {
                        actionsHtml += "<button class='btn btn-success' onclick=\"manageUser('" + email + "', 'promote')\">Promoviraj</button>";
                    }
                    else if(u.role === "Viši Djelatnik")
                    {
                        actionsHtml += "<button class='btn btn-warn' onclick=\"manageUser('" + email + "', 'demote')\">Unazadi</button>";
                    }
                }
                
                if(email !== "antoniorugulchdulchich@gmail.com")
                {
                    actionsHtml += "<button class='btn btn-danger' onclick=\"manageUser('" + email + "', 'delete')\">Obriši</button>";
                }
            }
            
            const tr = document.createElement("tr");
            tr.innerHTML = "<td>" + email + "</td><td><span class='badge'>" + u.role + "</span></td><td>" + u.status + "</td><td>" + actionsHtml + "</td>";
            tbody.appendChild(tr);
        }
    }

    async function manageUser(targetEmail, type)
    {
        if(!confirm("Jeste li sigurni da želite izvršiti ovu akciju nad " + targetEmail + "?"))
        {
            return;
        }
        
        try
        {
            await fetch(GOOGLE_URL + "?action=manage_user&token=" + sessionToken + "&target=" + encodeURIComponent(targetEmail) + "&type=" + type);
        }
        catch(e)
        {
            alert("Greška pri izvršavanju akcije.");
        }
    }
</script>

</body>
</html>
